[project]
name = "twat"
version = "0.2.2"
description = "Tool Wrapper for Agent TUIs — a local-first desktop shell around pi terminal sessions."
requires-python = ">=3.12,<3.14"
dependencies = [
    "PySide6>=6.7,<7",
    "ptyprocess>=0.7",
    "termqt>=1.1",
    "pywinpty>=2.0.13; sys_platform == 'win32'",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
twat = "twat.__main__:run"

[tool.hatch.build.targets.wheel]
packages = ["src/twat"]
