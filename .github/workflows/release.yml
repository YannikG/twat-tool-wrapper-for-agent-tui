name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: twat-macos
            platform: macos
          - os: ubuntu-latest
            artifact: twat-linux-x64
            platform: linux
          - os: windows-latest
            artifact: twat-windows-x64
            platform: windows
          - os: windows-11-arm
            artifact: twat-windows-arm64
            platform: windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install system Qt deps (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libdbus-1-3 libxcb-cursor0

      - name: Sync environment (incl. dev + pyinstaller)
        run: uv sync --group dev

      - name: Build PyInstaller bundle
        run: uv run python scripts/build/pyinstaller/build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/
          if-no-files-found: error
