name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4

      - name: Install system Qt deps for headless PySide6
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libdbus-1-3 libxcb-cursor0

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync environment
        run: uv sync

      - name: Ruff
        run: uv run ruff check

      - name: Ruff format
        run: uv run ruff format --check

      - name: Mypy
        run: uv run mypy

      - name: Pytest
        run: uv run pytest

      - name: Docs links + frontmatter
        run: uv run python scripts/ci/verify_docs.py

      - name: Architecture guardrails
        run: uv run python scripts/ci/verify_doc_guardrails.py

      - name: LOC limit
        run: uv run python scripts/ci/verify_loc_limit.py
